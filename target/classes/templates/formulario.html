<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title th:text="${persona.id == null} ? 'Nueva persona' : 'Editar Persona'">Persona</title>
</head>
<body>
    <h1 th:text="${persona.id == null} ? 'Nueva persona' : 'Editar Persona'">Persona</h1>

    <form action="/guardar" method="post" th:object="${persona}">
        <input type="hidden" th:field="*{id}">
        
        <label>Nombre:</label>
        <input type="text" th:field="*{nombre}"><br><br>

        <label>Apellido:</label>
        <input type="text" th:field="*{apellido}"><br><br>

        <label>Email:</label>
        <input type="email" th:field="*{email}"><br><br>

        <button type="submit">Guardar</button>
    </form>

    <br>
    <a href="/">Volver a la lista</a>
</body>
</html>
